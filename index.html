<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
   <link id="favicon" rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
    <title>GoogIe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="notice-bar" class="notice-bar">
    <span class="notice-text">⚠️ URLがまもなく変わります。データを保存しておいてください！</span>
    <button class="close-btn" onclick="closeNotice()">&times;</button>
</div>

<style>
/* テロップの見た目設定 */
.notice-bar {
    position: fixed; /* 画面に固定 */
    top: 0;          /* 上端に配置 */
    left: 0;
    width: 100%;
    background-color: #ff9800; /* 注意を引くオレンジ色 */
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    z-index: 9999;    /* 一番手前に表示 */
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}

.notice-text {
    flex-grow: 1;
}

/* バツボタンの見た目 */
.close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    padding: 0 15px;
    line-height: 1;
}

.close-btn:hover {
    color: #333; /* ホバー時に色を変える */
}

/* ページ本体が隠れないように調整（必要に応じて） */
body {
    margin-top: 50px; 
}
</style>

<script>
// ボタンを押した時に非表示にする関数
function closeNotice() {
    const notice = document.getElementById('notice-bar');
    notice.style.display = 'none';
    
    // もしmargin-topを付けていた場合、それもリセットするならここ
    document.body.style.marginTop = '0';
}
</script>
    <onpopstate="location.reload()">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="back-btn" onclick="Actions.goBack()" style="cursor: pointer; font-size: 20px; padding: 5px; display: none;">🔄</div>
            <div class="logo" onclick="Actions.goHome()">
                <span class="logo-red">▶</span> Premium
            </div>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="検索">
            <button id="search-btn">🔍</button>
        </div>
        <div class="user-icons">
            <div class="icon-circle" onclick="Actions.showSubs()">🔔</div>
        </div>
    </header>

    <div class="main-layout">
        <nav class="sidebar">
            <div class="nav-item" onclick="Actions.goHome()">🏠<span>ホーム</span></div>
            <div class="nav-item" onclick="Actions.showShorts()">⚡<span>ショート</span></div>
            <div class="nav-item" onclick="Actions.showLiveHub()" style="color: #ff4e45; font-weight: bold;">🔴<span>Live</span></div>
            <div class="nav-item" onclick="Actions.showSubs()">👥<span>登録済み</span></div>
            <hr>
            <div class="nav-item" onclick="Actions.showHistory()">🕒<span>履歴</span></div>
        </nav>
        <main class="content" id="view-container"></main>
    </div>

    <script src="music.js"></script>

<script src="api/m3u8.js"></script>
    <script src="app.js"></script>
    <script src="playlist.js"></script>
    <script src="backup.js"></script>
</body>
</html>
